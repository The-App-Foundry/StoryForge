name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze Qt App
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Catch the Qt wave and install the framework dependencies
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0' # Set this to your app's exact Qt version, dude
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'

    # 2. Initialize the CodeQL tools to watch the compiler
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'cpp'

    # 3. Build your Qt app so CodeQL can analyze the compilation
    - name: Configure and Build Project
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --parallel $(nproc)

    # 4. Perform the CodeQL analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
